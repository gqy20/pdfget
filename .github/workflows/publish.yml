name: Release & Publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release-and-publish:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6.0.1

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install uv
      uses: astral-sh/setup-uv@v7.1.4

    - name: Install dependencies
      run: |
        uv sync --dev

    - name: Run tests
      run: |
        uv run pytest tests/ -v --cov=src --cov-report=xml

    - name: Run code quality checks
      run: |
        uv run ruff check .
        uv run ruff format .
        uv run mypy src/

    - name: Build package
      run: |
        uv build

    - name: Check package
      run: |
        uv run twine check dist/*

    - name: Generate release notes
      id: release_notes
      run: |
        python << 'EOF'
        import os
        import re
        from pathlib import Path

        content = Path("docs/CHANGELOG.md").read_text(encoding="utf-8")
        version_match = re.search(
            r"^## \[([0-9.]+)\] - ([0-9-]+)\n", content, re.MULTILINE
        )
        if not version_match:
            raise SystemExit("Latest changelog entry not found")

        version = version_match.group(1)
        date = version_match.group(2)
        section_start = version_match.start()
        next_version_match = re.search(
            r"^## \[[0-9.]+\] - [0-9-]+\n",
            content[version_match.end():],
            re.MULTILINE,
        )
        if next_version_match:
            section_end = version_match.end() + next_version_match.start()
            notes = content[section_start:section_end].rstrip()
        else:
            notes = content[section_start:].rstrip()

        with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
            output.write(f"version={version}\n")
            output.write(f"date={date}\n")
            output.write("notes<<EOF\n")
            output.write(notes)
            output.write("\nEOF\n")
        EOF

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2.5.0
      with:
        tag_name: ${{ github.ref_name }}
        name: Release ${{ steps.release_notes.outputs.version }}
        body: |
          ${{ steps.release_notes.outputs.notes }}
        draft: false
        prerelease: false

    - name: Publish to PyPI
      env:
        PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
      run: |
        uv publish --token $PYPI_API_TOKEN

    - name: Release Confirmation
      if: success()
      run: |
        echo "Release ${{ steps.release_notes.outputs.version }} published successfully!"
        echo "PyPI: https://pypi.org/project/pdfget/${{ steps.release_notes.outputs.version }}/"
        echo "GitHub: https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}"
